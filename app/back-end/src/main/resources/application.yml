app:
  auth:
    jwt:
      # REQ-004: 로컬/테스트용 기본값. 운영 배포에서는 외부 설정으로 덮어쓴다.
      secret: "local-development-only-secret-32bytes!!"
      issuer: "bdd-workflow"
      audience: "bdd-workflow-api"
      clock-skew-seconds: 60
      # REQ-011: 로그인 시 발급되는 access token 의 유효 기간 (초).
      access-token-ttl-seconds: 3600
    cookie:
      # REQ-011: access token 을 담을 Cookie 의 속성. Secure 는 profile 에서 분기한다.
      name: "ACCESS_TOKEN"
      path: "/"
      same-site: "Strict"
      max-age-seconds: 3600
      secure: false

spring:
  application:
    name: bdd-workflow-example
  datasource:
    url: jdbc:h2:mem:bdd-workflow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
