plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.5'
    id 'io.spring.dependency-management' version '1.1.6'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

sourceSets {
    harness {
        java {
            srcDir 'src/harness/java'
        }
    }
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.6.0'
    implementation 'org.springframework.security:spring-security-crypto'

    runtimeOnly 'com.h2database:h2'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    harnessImplementation 'com.github.javaparser:javaparser-core:3.26.4'
}

tasks.named('test') {
    useJUnitPlatform()
    testLogging {
        events 'passed', 'skipped', 'failed'
    }
}

tasks.register('generateHarnessSourceIndex', JavaExec) {
    group = 'verification'
    description = 'Generate JavaParser-based API/test source index for the BDD harness.'
    classpath = sourceSets.harness.runtimeClasspath
    mainClass = 'com.example.bddworkflow.harness.SourceIndexGenerator'
    args rootProject.projectDir.parentFile.absolutePath,
            file('src/main/java').absolutePath,
            file('src/test/java').absolutePath,
            layout.buildDirectory.file('harness/source-index.json').get().asFile.absolutePath
}

tasks.register('traceRequirements', Exec) {
    group = 'verification'
    description = 'Generate requirement/API/test trace report from cards, source index, and safe terminology report.'
    dependsOn tasks.named('generateHarnessSourceIndex'), tasks.named('validateTerminology')
    commandLine 'node', 'tools/trace-requirements.mjs'
}

tasks.register('previewSchema', Exec) {
    group = 'verification'
    description = 'Generate DDL preview from JPA @Entity classes for human review before migration.'
    dependsOn tasks.named('generateHarnessSourceIndex')
    commandLine 'node', 'tools/preview-schema.mjs'
}

tasks.register('indexTerminology', Exec) {
    group = 'verification'
    description = 'Build terminology-index.json from docs/terminology/ JSON sources.'
    commandLine 'node', 'tools/terminology.mjs', 'index'
}

tasks.register('validateTerminology', Exec) {
    group = 'verification'
    description = 'Validate terminology against requirement cards and source-index in safe mode (warnings only, always exit 0).'
    dependsOn tasks.named('generateHarnessSourceIndex'), tasks.named('indexTerminology')
    commandLine 'node', 'tools/terminology.mjs', 'validate'
}

tasks.register('validateTerminologyStrict', Exec) {
    group = 'verification'
    description = 'Validate terminology in strict mode (severe findings become errors and fail the build).'
    dependsOn tasks.named('generateHarnessSourceIndex'), tasks.named('indexTerminology')
    commandLine 'node', 'tools/terminology.mjs', 'validate', '--strict'
}

tasks.register('validateHarness', Exec) {
    group = 'verification'
    description = 'Run the requirement trace and fail when any requirement remains RED.'
    dependsOn tasks.named('test'),
            tasks.named('generateHarnessSourceIndex'),
            tasks.named('validateTerminology')
    commandLine 'node', 'tools/trace-requirements.mjs', '--check'
}

tasks.named('check') {
    dependsOn tasks.named('validateHarness')
}
