spring:
  application:
    name: bdd-workflow-example
  datasource:
    url: jdbc:h2:mem:bdd-workflow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
